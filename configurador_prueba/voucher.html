<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voucher OXXO - Voltika</title>
<style>
body{margin:0;font-family:Inter,Arial,sans-serif;background:#f5f5f5;}
.top-bar{position:sticky;top:0;z-index:10;background:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #eee;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.top-bar .logo{height:28px;width:auto;}
.top-bar .title{font-size:15px;font-weight:700;color:#1a3a5c;}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-print{background:#039fe1;color:#fff;}
.btn-back{background:#f5f5f5;border:1.5px solid #ccc;color:#333;}
.voucher-frame{width:100%;height:calc(100vh - 60px);border:none;background:#fff;}
.error{max-width:500px;margin:60px auto;padding:24px;text-align:center;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.error h2{color:#C62828;margin:0 0 12px;}
.error p{color:#555;font-size:14px;}
@media print{
  .top-bar{display:none!important;}
  .voucher-frame{height:auto;min-height:95vh;}
}
</style>
</head>
<body>
<div class="top-bar">
  <button class="btn btn-back" onclick="window.close();history.back();">&larr; Volver</button>
  <span class="title">Voucher de Pago OXXO</span>
  <button class="btn btn-print" onclick="window.print()">Imprimir / PDF</button>
</div>
<div id="content"></div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var url = params.get('url');
  var clabe = params.get('clabe');
  var container = document.getElementById('content');

  // CLABE copy mode
  if (clabe) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(clabe).then(function() {
        container.innerHTML = '<div style="max-width:500px;margin:60px auto;padding:24px;text-align:center;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);"><div style="font-size:48px;margin-bottom:12px;">&#10003;</div><h2 style="color:#00C851;margin:0 0 8px;">CLABE copiada</h2><p style="font-size:16px;font-weight:900;color:#333;letter-spacing:0.5px;margin:0 0 12px;">' + clabe + '</p><p style="color:#555;font-size:14px;">Ya puedes pegarla en tu app bancaria para realizar la transferencia.</p><p style="margin-top:16px;"><a href="https://voltika.mx" style="color:#039fe1;font-weight:700;">Ir a voltika.mx</a></p></div>';
      });
    } else {
      // Fallback: select text
      container.innerHTML = '<div style="max-width:500px;margin:60px auto;padding:24px;text-align:center;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);"><h2 style="color:#1a3a5c;margin:0 0 8px;">CLABE Interbancaria</h2><input type="text" value="' + clabe + '" readonly style="width:100%;font-size:16px;font-weight:900;text-align:center;padding:14px;border:2px solid #039fe1;border-radius:8px;margin:12px 0;" onclick="this.select()"><p style="color:#555;font-size:13px;">Toca el campo para seleccionar y copiar.</p></div>';
    }
    return;
  }

  if (!url || !/^https:\/\//.test(url)) {
    container.innerHTML = '<div class="error"><h2>&#9888; Enlace no válido</h2><p>No se encontró la referencia de pago. Verifica el enlace o contacta a soporte.</p><p style="margin-top:16px;"><a href="https://voltika.mx" style="color:#039fe1;font-weight:700;">Ir a voltika.mx</a></p></div>';
    return;
  }
  container.innerHTML = '<iframe class="voucher-frame" src="' + url + '" allowfullscreen></iframe>';
})();
</script>
</body>
</html>
