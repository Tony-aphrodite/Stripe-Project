<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Voltika — Limpiar duplicados</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #f7f8fa; }
  h1 { font-size: 1.3rem; }
  .card { background: #fff; border-radius: 10px; padding: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 1rem; }
  button { padding: .7rem 1.4rem; border: none; border-radius: 7px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-right: .5rem; }
  .btn-dry { background: #ffd666; color: #664d00; }
  .btn-run { background: #ff4d4f; color: #fff; }
  .btn-run[disabled] { background: #ccc; cursor: not-allowed; }
  .summary { font-weight: 700; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
  .ok   { background: #e6f4ea; color: #1e7e34; }
  .warn { background: #fffbe6; color: #ad6800; }
  .fail { background: #fde8e8; color: #c41e3a; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th, td { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid #eee; }
  th { background: #fafafa; }
  code { font-family: ui-monospace, Consolas, monospace; font-size: .82rem; background: #f5f5f5; padding: 1px 4px; border-radius: 3px; }
  .result { white-space: pre-wrap; background: #0d1117; color: #c9d1d9; padding: 1rem; border-radius: 6px; font-family: monospace; font-size: .78rem; max-height: 300px; overflow: auto; }
</style>
</head>
<body>

<h1>🧹 Limpiar transacciones duplicadas</h1>

<div class="card">
  <p>Por cada <code>pedido</code> duplicado: <strong>conserva el id más antiguo</strong> y elimina el resto.</p>
  <p style="color:#666;font-size:.85rem;">⚠ Debes estar logueado en <a href="/admin/" target="_blank">/admin</a> como admin.</p>
  <div>
    <button class="btn-dry" onclick="run(true)">1. Previsualizar</button>
    <button class="btn-run" id="btnRun" disabled onclick="go()">2. Ejecutar DELETE</button>
  </div>
</div>

<div id="summary"></div>
<div id="tableCard" class="card" style="display:none">
  <h3 style="margin-top:0">Grupos duplicados</h3>
  <table><thead><tr><th>Pedido</th><th>Total</th><th>Conservar id</th><th>Eliminar ids</th></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="card" id="resCard" style="display:none"><h3 style="margin-top:0">Respuesta</h3><div class="result" id="result"></div></div>

<script>
const ENDPOINT = '/admin/php/ventas/reparar-duplicados.php';

async function run(dryRun) {
  const sum = document.getElementById('summary');
  const tc  = document.getElementById('tableCard');
  const tb  = document.getElementById('tbody');
  const rc  = document.getElementById('resCard');
  const rr  = document.getElementById('result');
  sum.innerHTML = '<div class="summary warn">⏳ ...</div>';
  tc.style.display = 'none';
  rc.style.display = 'none';

  try {
    const res = await fetch(ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({ dry_run: dryRun })
    });
    const d = await res.json();
    rr.textContent = JSON.stringify(d, null, 2);
    rc.style.display = 'block';

    if (!res.ok || !d.ok) {
      sum.innerHTML = `<div class="summary fail">❌ ${d.error || 'Error'}</div>`;
      return;
    }

    const groups = d.groups || [];
    if (dryRun) {
      if (!groups.length) {
        sum.innerHTML = `<div class="summary ok">✅ No hay duplicados.</div>`;
        document.getElementById('btnRun').disabled = true;
      } else {
        const totalDel = groups.reduce((s,g) => s + g.deleted_ids.length, 0);
        sum.innerHTML = `<div class="summary warn">⚠ ${groups.length} grupos / ${totalDel} filas se eliminarán</div>`;
        document.getElementById('btnRun').disabled = false;
      }
    } else {
      sum.innerHTML = `<div class="summary ok">✅ ${d.rows_deleted} filas eliminadas</div>`;
      document.getElementById('btnRun').disabled = true;
    }

    if (groups.length) {
      tc.style.display = 'block';
      tb.innerHTML = groups.map(g => `
        <tr>
          <td><code>${g.pedido}</code></td>
          <td>${g.total}</td>
          <td style="color:#1e7e34;font-weight:700">${g.kept}</td>
          <td style="color:#c41e3a">${g.deleted_ids.join(', ')}</td>
        </tr>
      `).join('');
    }
  } catch (e) {
    sum.innerHTML = `<div class="summary fail">❌ ${e.message}</div>`;
  }
}

function go() {
  if (!confirm('¿Eliminar las filas marcadas? No hay undo.')) return;
  run(false);
}
</script>

</body>
</html>
