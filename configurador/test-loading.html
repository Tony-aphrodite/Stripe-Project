<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Loading Screen</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; padding: 20px; font-family: 'Inter', -apple-system, sans-serif; }
.container { max-width: 500px; width: 100%; }

.vk-loading-screen {
    background: linear-gradient(180deg, #1c3eaf 0%, #2758ca 50%, #376ee3 100%);
    border-radius: 16px;
    padding: 40px 20px;
    text-align: center;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.vk-loading-screen__logo {
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
}

.vk-loading-screen__moto {
    width: 340px;
    max-width: 95%;
    margin: 0 auto 24px;
    position: relative;
    z-index: 1;
}

.vk-loading-moto__img {
    width: 100%;
    height: auto;
    display: block;
}

/* Subtle rotating arc wheel overlays */
.vk-loading-wheel {
    position: absolute;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgba(0,220,255,0.8);
    border-right-color: rgba(0,220,255,0.4);
    animation: vk-wheel-rotate 1s linear infinite, vk-wheel-glow 2s ease-in-out infinite;
}

.vk-loading-wheel--rear {
    width: 24%;
    height: 0;
    padding-bottom: 24%;
    bottom: 10%;
    left: 11%;
    animation-delay: 0s, 0.3s;
}

.vk-loading-wheel--front {
    width: 24%;
    height: 0;
    padding-bottom: 24%;
    bottom: 10%;
    right: 12%;
}

@keyframes vk-wheel-rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes vk-wheel-glow {
    0%, 100% {
        box-shadow: 0 0 8px rgba(0,180,255,0.2), inset 0 0 8px rgba(0,180,255,0.1);
    }
    50% {
        box-shadow: 0 0 18px rgba(0,200,255,0.5), inset 0 0 18px rgba(0,200,255,0.2);
    }
}

.vk-loading-screen__text { color: white; margin-bottom: 16px; position: relative; z-index: 1; }
.vk-loading-screen__text h2 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
.vk-loading-screen__text p { font-size: 18px; font-weight: 500; opacity: 0.85; line-height: 1.4; }
.vk-loading-screen__hint { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 24px; position: relative; z-index: 1; }
.vk-loading-screen__dots { display: flex; gap: 10px; justify-content: center; position: relative; z-index: 1; }

.vk-loading-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(0,180,255,0.4);
    animation: vk-dot-pulse 1.4s ease-in-out infinite;
}
.vk-loading-dot:nth-child(2) { animation-delay: 0.2s; }
.vk-loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes vk-dot-pulse {
    0%, 80%, 100% { background: rgba(0,180,255,0.3); transform: scale(0.8); }
    40% { background: rgba(0,220,255,1); transform: scale(1.3); box-shadow: 0 0 10px rgba(0,200,255,0.6); }
}
</style>
</head>
<body>
<div class="container">
<div class="vk-loading-screen">

    <!-- Logo -->
    <div class="vk-loading-screen__logo">
        <img src="img/voltika_shield.svg" alt="" style="height:28px;margin-right:6px;vertical-align:middle;" onerror="this.style.display='none'">
        <span style="font-size:22px;font-weight:700;color:white;vertical-align:middle;letter-spacing:0.5px;">voltika</span>
    </div>

    <!-- Motorcycle with wheel overlays -->
    <div class="vk-loading-screen__moto">
        <img src="img/loding.png" alt="" class="vk-loading-moto__img">
        <div class="vk-loading-wheel vk-loading-wheel--rear"></div>
        <div class="vk-loading-wheel vk-loading-wheel--front"></div>
    </div>

    <div class="vk-loading-screen__text">
        <h2>Un momento...</h2>
        <p>Estamos confirmando<br>tu aprobaci&oacute;n Voltika</p>
    </div>
    <div class="vk-loading-screen__hint">Esto toma solo unos segundos</div>
    <div class="vk-loading-screen__dots">
        <span class="vk-loading-dot"></span>
        <span class="vk-loading-dot"></span>
        <span class="vk-loading-dot"></span>
    </div>
</div>
</div>
</body>
</html>
