<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventario — Voltika</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="css/admin.css">
<style>
.page-header {
  background: linear-gradient(135deg,#1a3a5c,#039fe1);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.page-header img { height: 32px; }
.page-header h1 { color:#fff; font-size:18px; font-weight:800; margin:0; }
.page-header-right { margin-left:auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.back-link {
  color:rgba(255,255,255,.8); font-size:13px; text-decoration:none;
  display:flex; align-items:center; gap:6px;
}
.back-link:hover { color:#fff; }
.detail-row { display:flex; flex-wrap:wrap; gap:24px; }
.detail-main { flex:1; min-width:0; }
.detail-side { width:280px; flex-shrink:0; }
.info-card {
  background:#fff; border-radius:12px; border:1.5px solid var(--vka-border);
  box-shadow:var(--vka-shadow); padding:16px 20px; margin-bottom:16px;
}
.info-card-title {
  font-size:12px; font-weight:700; color:var(--vka-blue);
  text-transform:uppercase; letter-spacing:.5px;
  border-bottom:1px solid var(--vka-blue-light); padding-bottom:8px; margin-bottom:12px;
}
.info-row {
  display:flex; justify-content:space-between;
  padding:5px 0; border-bottom:1px solid var(--vka-grey-light);
  font-size:13px;
}
.info-row:last-child { border-bottom:none; }
.info-label { color:var(--vka-grey); }
.info-value { font-weight:600; color:#1a1a1a; text-align:right; }
.tracker-vertical { display:flex; flex-direction:column; gap:0; padding:4px 0; }
.empty-inv { text-align:center; padding:60px 20px; color:var(--vka-grey); }

/* ── Mobile inventory card list ── */
.inv-card-list { display:flex; flex-direction:column; gap:8px; }
.inv-list-card {
  background:#fff;
  border-radius:10px;
  border:1.5px solid var(--vka-border);
  padding:12px 14px;
  cursor:pointer;
  box-shadow:var(--vka-shadow);
  transition:box-shadow .15s, transform .1s;
}
.inv-list-card:active { box-shadow:var(--vka-shadow-lg); transform:scale(.99); }
.inv-card-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.inv-card-top { margin-bottom:2px; }
.inv-card-bottom { margin-top:6px; padding-top:6px; border-top:1px solid var(--vka-border); }
.inv-card-modelo { font-size:15px; font-weight:700; color:var(--vka-blue-dark); }
.inv-card-color  { font-size:13px; font-weight:400; color:var(--vka-grey); }
.inv-card-vin    { font-size:12px; color:var(--vka-grey); }
.inv-card-cliente{ font-size:12px; color:#444; }

@media (max-width: 480px) {
  /* ── Header ── */
  .page-header {
    padding: 10px 12px;
    gap: 6px;
  }
  .page-header img { height: 20px; }
  .page-header h1 { font-size: 13px; flex: 1; }
  .back-link { font-size: 12px; white-space: nowrap; }
  .page-header-right {
    width: 100%;
    gap: 6px;
    flex-wrap: nowrap;
    margin-left: 0;
    border-top: 1px solid rgba(255,255,255,.2);
    padding-top: 8px;
  }
  #header-punto {
    flex: 1;
    font-size: 11px !important;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Stat cards: 3 columns ── */
  .stat-cards {
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 8px !important;
  }
  .stat-card { padding: 10px 8px !important; }
  .stat-card-value { font-size: 22px !important; }
  .stat-card-label { font-size: 10px !important; }

  /* ── Filter bar ── */
  .filter-bar { gap: 8px; }
  .filter-bar input {
    flex: 0 0 100% !important;
    width: 100% !important;
    font-size: 13px;
  }
  .filter-bar select {
    flex: 1 1 calc(50% - 4px);
    min-width: 0;
    font-size: 12px;
    padding: 7px 8px;
  }
  .filter-bar .btn { flex-shrink: 0; }

  /* ── Tabs ── */
  .tabs { gap: 0; }
  .tab { padding: 10px 12px; font-size: 12px; flex: 1; text-align: center; }

  /* ── Ventas summary pills ── */
  #ventas-summary { gap: 8px; }
  #ventas-summary > div { font-size: 11px !important; padding: 6px 10px !important; }

  /* ── Table ── */
  .admin-main { padding: 12px 10px !important; }
}
</style>
</head>
<body class="admin-body">

<!-- Redirect if not logged in (handled by JS) -->

<!-- ═══ HEADER ═══════════════════════════════════════════════════════════════ -->
<div class="page-header">
  <a href="dealer-panel.html" class="back-link">← Panel</a>
  <img src="https://www.voltika.mx/configurador_prueba/img/voltika_logo_h_white.svg" alt="Voltika"
       onerror="this.style.display='none'">
  <h1>Inventario de Motocicletas</h1>
  <div class="page-header-right">
    <span id="header-punto" style="color:rgba(255,255,255,.8);font-size:13px;"></span>
    <button class="btn btn-sm" onclick="openModalAdd()"
      style="background:#fff;color:var(--vka-blue-dark);border:none;font-weight:700;">
      + Agregar moto
    </button>
    <button class="btn-logout" style="color:rgba(255,255,255,.7)" onclick="doLogout()">⏻ Salir</button>
  </div>
</div>

<!-- ═══ MAIN ══════════════════════════════════════════════════════════════════ -->
<div class="admin-main">

  <!-- Stat cards -->
  <div class="stat-cards" id="stat-cards">
    <div class="stat-card"><div class="stat-card-value">—</div><div class="stat-card-label">Total motos</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchInvTab('lista')">📋 Lista</div>
    <div class="tab" onclick="switchInvTab('ventas')">💰 Ventas</div>
    <div class="tab" onclick="switchInvTab('referidos')">🤝 Referidos</div>
  </div>

  <!-- ── LISTA TAB ─────────────────────────────────────────────────────────── -->
  <div id="invtab-lista" class="tab-content active">
    <!-- Filter bar -->
    <div class="filter-bar">
      <input type="text" id="filter-q" placeholder="Buscar por VIN, cliente, pedido..." style="flex:1;min-width:160px;" oninput="filtrarMotos()">
      <select id="filter-estado" onchange="filtrarMotos()">
        <option value="todos">Todos los estados</option>
        <option value="por_llegar">Por Llegar</option>
        <option value="recibida">Recibida</option>
        <option value="por_ensamblar">Por Ensamblar</option>
        <option value="en_ensamble">En Ensamble</option>
        <option value="lista_para_entrega">Lista para Entrega</option>
        <option value="por_validar_entrega">Por Validar Entrega</option>
        <option value="entregada">Entregada</option>
        <option value="retenida">Retenida</option>
      </select>
      <select id="filter-tipo" onchange="filtrarMotos()">
        <option value="">Todos los tipos</option>
        <option value="voltika_entrega">Voltika Entrega</option>
        <option value="consignacion">Consignación</option>
      </select>
      <select id="filter-modelo" onchange="filtrarMotos()">
        <option value="">Todos los modelos</option>
        <option value="MO3">MO3</option>
        <option value="MO5">MO5</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="loadInventario()">🔄 Actualizar</button>
    </div>

    <!-- Table -->
    <div id="inv-table-wrap">
      <div class="empty-inv"><div class="loader dark" style="width:32px;height:32px;border-width:3px;"></div><p style="margin-top:12px;">Cargando inventario...</p></div>
    </div>
  </div>

  <!-- ── VENTAS TAB ────────────────────────────────────────────────────────── -->
  <div id="invtab-ventas" class="tab-content">
    <div class="filter-bar">
      <input type="text" id="ventas-q" placeholder="Buscar..." oninput="loadVentas()">
      <select id="ventas-tipo" onchange="loadVentas()">
        <option value="">Todos los tipos</option>
        <option value="entrega_voltika">Entrega Voltika</option>
        <option value="venta_punto">Venta en punto</option>
        <option value="devolucion">Devolución</option>
        <option value="ajuste">Ajuste</option>
        <option value="reserva">Reserva</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="loadVentas()">🔄 Actualizar</button>
    </div>
    <div id="ventas-summary" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;"></div>
    <div id="ventas-table-wrap">
      <div class="empty-inv"><p>Cargando registro de ventas...</p></div>
    </div>
  </div>

  <!-- ── REFERIDOS TAB ─────────────────────────────────────────────────────── -->
  <div id="invtab-referidos" class="tab-content">
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
      <button class="btn btn-primary btn-sm" onclick="openModalReferido()">+ Agregar referido</button>
    </div>
    <div id="referidos-wrap">
      <div class="empty-inv"><p>Cargando referidos...</p></div>
    </div>
  </div>

</div><!-- /admin-main -->

<!-- Toast -->
<div id="toast-container"></div>

<!-- ═══ MODAL: DETALLE MOTO ═══════════════════════════════════════════════════ -->
<div id="modal-detalle" class="modal-overlay" onclick="closeModalOnOverlay(event,'modal-detalle')">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <span class="modal-title" id="modal-detalle-title">Detalle de moto</span>
      <button class="modal-close" onclick="closeModal('modal-detalle')">×</button>
    </div>
    <div class="modal-body" id="modal-detalle-body">Cargando...</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-detalle')">Cerrar</button>
      <button class="btn btn-primary btn-sm" id="btn-editar-moto" onclick="editarMoto()">✏️ Editar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: AGREGAR / EDITAR MOTO ═════════════════════════════════════════ -->
<div id="modal-add" class="modal-overlay" onclick="closeModalOnOverlay(event,'modal-add')">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <span class="modal-title" id="modal-add-title">Agregar motocicleta</span>
      <button class="modal-close" onclick="closeModal('modal-add')">×</button>
    </div>
    <div class="modal-body">
      <form id="form-add" onsubmit="submitMoto(event)">
        <div class="form-grid">
          <div class="field">
            <label>VIN *</label>
            <input type="text" id="f-vin" placeholder="VK2024MO3XXXXX" required maxlength="50">
          </div>
          <div class="field">
            <label>Modelo *</label>
            <select id="f-modelo" required>
              <option value="">Seleccionar</option>
              <option value="MO3">MO3</option>
              <option value="MO5">MO5</option>
            </select>
          </div>
          <div class="field">
            <label>Color *</label>
            <input type="text" id="f-color" placeholder="Negro, Blanco, Azul..." required>
          </div>
          <div class="field">
            <label>Tipo de asignación</label>
            <select id="f-tipo">
              <option value="voltika_entrega">Voltika Entrega</option>
              <option value="consignacion">Consignación</option>
            </select>
          </div>
          <div class="field">
            <label>Estado inicial</label>
            <select id="f-estado">
              <option value="por_llegar">Por Llegar</option>
              <option value="recibida">Recibida</option>
              <option value="en_ensamble">En Ensamble</option>
              <option value="lista_para_entrega">Lista para Entrega</option>
            </select>
          </div>
          <div class="field">
            <label>Fecha de llegada</label>
            <input type="date" id="f-fecha-llegada">
          </div>
          <div class="field form-col-2">
            <label>Nombre del cliente</label>
            <input type="text" id="f-cliente-nombre" placeholder="Juan Pérez">
          </div>
          <div class="field">
            <label>Email del cliente</label>
            <input type="email" id="f-cliente-email" placeholder="juan@mail.com">
          </div>
          <div class="field">
            <label>Teléfono del cliente</label>
            <input type="text" id="f-cliente-tel" placeholder="5512345678">
          </div>
          <div class="field">
            <label>Número de pedido</label>
            <input type="text" id="f-pedido-num" placeholder="VK-ABC123">
          </div>
          <div class="field">
            <label>Estado de pago</label>
            <select id="f-pago-estado">
              <option value="pagada">Pagada</option>
              <option value="pendiente">Pendiente</option>
              <option value="parcial">Parcial</option>
            </select>
          </div>
          <div class="field">
            <label>Precio de venta (MXN)</label>
            <input type="number" id="f-precio" placeholder="45000" min="0">
          </div>
          <div class="field form-col-2" style="border-top:2px solid var(--vka-border);padding-top:14px;margin-top:10px;">
            <label style="font-size:13px;font-weight:800;color:var(--vka-blue-dark);">Información adicional</label>
          </div>
          <div class="field">
            <label>Año modelo</label>
            <input type="text" id="f-anio-modelo" placeholder="2026">
          </div>
          <div class="field">
            <label>Potencia</label>
            <input type="text" id="f-potencia" placeholder="3000W">
          </div>
          <div class="field form-col-2">
            <label>Descripción</label>
            <textarea id="f-descripcion" rows="2" placeholder="Descripción del modelo..."></textarea>
          </div>
          <div class="field form-col-2">
            <label>Accesorios</label>
            <textarea id="f-accesorios" rows="2" placeholder="Lista de accesorios incluidos..."></textarea>
          </div>
          <div class="field form-col-2" style="border-top:2px solid var(--vka-border);padding-top:14px;margin-top:10px;">
            <label style="font-size:13px;font-weight:800;color:var(--vka-blue-dark);">Información aduanal</label>
          </div>
          <div class="field">
            <label>No. Pedimento</label>
            <input type="text" id="f-num-pedimento" placeholder="26 47 3463 6001234">
          </div>
          <div class="field">
            <label>Fecha ingreso al país</label>
            <input type="date" id="f-fecha-ingreso-pais">
          </div>
          <div class="field">
            <label>Aduana</label>
            <input type="text" id="f-aduana" placeholder="Manzanillo, Colima">
          </div>
          <div class="field">
            <label>Hecho en</label>
            <input type="text" id="f-hecho-en" placeholder="China" value="China">
          </div>
          <div class="field form-col-2">
            <label>Notas</label>
            <textarea id="f-notas" rows="3" placeholder="Notas internas..."></textarea>
          </div>
        </div>
        <input type="hidden" id="f-moto-id">
        <div style="display:none;" id="form-add-error" class="login-error visible"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">Cancelar</button>
      <button class="btn btn-primary" onclick="submitMoto(null)" id="btn-save-moto">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: REFERIDO ═══════════════════════════════════════════════════════ -->
<div id="modal-referido" class="modal-overlay" onclick="closeModalOnOverlay(event,'modal-referido')">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <span class="modal-title">Agregar Referido</span>
      <button class="modal-close" onclick="closeModal('modal-referido')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid single">
        <div class="field"><label>Nombre *</label><input type="text" id="ref-nombre" placeholder="Juan Pérez"></div>
        <div class="field"><label>Email</label><input type="email" id="ref-email" placeholder="juan@mail.com"></div>
        <div class="field"><label>Teléfono</label><input type="text" id="ref-tel" placeholder="5512345678"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-referido')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarReferido()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════════
let dealer = null;
let allMotos = [];
let currentDetalleId = null;

const ESTADOS_LABEL = {
  por_llegar:'Por Llegar', recibida:'Recibida', por_ensamblar:'Por Ensamblar',
  en_ensamble:'En Ensamble', lista_para_entrega:'Lista para Entrega',
  por_validar_entrega:'Por Validar Entrega', entregada:'Entregada', retenida:'Retenida'
};
const ESTADOS_BADGE = {
  por_llegar:'badge-por-llegar', recibida:'badge-recibida', por_ensamblar:'badge-por-ensamblar',
  en_ensamble:'badge-en-ensamble', lista_para_entrega:'badge-lista',
  por_validar_entrega:'badge-por-validar', entregada:'badge-entregada', retenida:'badge-retenida'
};

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  fetch('php/admin-login.php', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'check'})
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) {
      dealer = d.dealer;
      document.getElementById('header-punto').textContent = dealer.punto_nombre || '';
      loadInventario();
    } else {
      window.location.href = 'dealer-panel.html';
    }
  })
  .catch(() => window.location.href = 'dealer-panel.html');
});

async function doLogout() {
  await fetch('php/admin-login.php', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'logout'})});
  window.location.href = 'dealer-panel.html';
}

// ═══════════════════════════════════════════════════════════════════════════════
// INVENTARIO
// ═══════════════════════════════════════════════════════════════════════════════
async function loadInventario() {
  document.getElementById('inv-table-wrap').innerHTML =
    '<div class="empty-inv"><div class="loader dark" style="width:28px;height:28px;border-width:3px;"></div></div>';
  try {
    const r = await fetch('php/admin-inventario.php');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    allMotos = d.motos || [];
    renderStats(d.stats || {});
    filtrarMotos();
  } catch(e) {
    document.getElementById('inv-table-wrap').innerHTML =
      `<div class="empty-inv" style="color:var(--vka-red)">Error al cargar inventario. <a href="#" onclick="loadInventario()">Reintentar</a></div>`;
  }
}

function renderStats(stats) {
  const total = Object.values(stats).reduce((a,b) => a+b, 0);
  const entregadas = stats.entregada || 0;
  const activas    = total - entregadas;
  const ensamble   = stats.en_ensamble || 0;
  const listas     = (stats.lista_para_entrega || 0) + (stats.por_validar_entrega || 0);

  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card blue"><div class="stat-card-value">${total}</div><div class="stat-card-label">Total motos</div></div>
    <div class="stat-card"><div class="stat-card-value">${activas}</div><div class="stat-card-label">Activas</div></div>
    <div class="stat-card orange"><div class="stat-card-value">${ensamble}</div><div class="stat-card-label">En ensamble</div></div>
    <div class="stat-card green"><div class="stat-card-value">${listas}</div><div class="stat-card-label">Listas para entrega</div></div>
    <div class="stat-card"><div class="stat-card-value">${entregadas}</div><div class="stat-card-label">Entregadas</div></div>
  `;
}

function filtrarMotos() {
  const q      = document.getElementById('filter-q').value.toLowerCase();
  const estado = document.getElementById('filter-estado').value;
  const tipo   = document.getElementById('filter-tipo').value;
  const modelo = document.getElementById('filter-modelo').value;

  let motos = allMotos.filter(m => {
    if (estado !== 'todos' && m.estado !== estado) return false;
    if (tipo && m.tipo_asignacion !== tipo) return false;
    if (modelo && !m.modelo.includes(modelo)) return false;
    if (q) {
      const hay = (m.vin||'').toLowerCase().includes(q) ||
                  (m.cliente_nombre||'').toLowerCase().includes(q) ||
                  (m.pedido_num||'').toLowerCase().includes(q) ||
                  (m.modelo||'').toLowerCase().includes(q);
      if (!hay) return false;
    }
    return true;
  });

  renderTable(motos);
}

function renderTable(motos) {
  const wrap = document.getElementById('inv-table-wrap');
  if (!motos.length) {
    wrap.innerHTML = '<div class="empty-inv"><div class="empty-state-icon">🏍️</div><p>No se encontraron motos con los filtros seleccionados.</p></div>';
    return;
  }

  const isMobile = window.innerWidth <= 680;

  if (isMobile) {
    // ── Mobile: card list ──────────────────────────────────────────────────────
    let html = '<div class="inv-card-list">';
    motos.forEach(m => {
      const badgeCls  = ESTADOS_BADGE[m.estado] || '';
      const tipoCls   = m.tipo_asignacion === 'consignacion' ? 'badge-consignacion' : 'badge-voltika';
      const tipoLabel = m.tipo_asignacion === 'consignacion' ? 'Consig.' : 'Voltika';
      const diasAlert = m.dias_en_paso > 1;
      const pagoColor = m.pago_estado === 'pagada' ? 'color:#059669;' : 'color:var(--vka-orange);';
      html += `
        <div class="inv-list-card" onclick="openDetalle(${m.id})">
          <div class="inv-card-row inv-card-top">
            <span class="inv-card-modelo">${esc(m.modelo)} <span class="inv-card-color">${esc(m.color)}</span></span>
            <span class="badge ${badgeCls}">${ESTADOS_LABEL[m.estado]||m.estado}</span>
          </div>
          <div class="inv-card-row" style="margin-top:4px;">
            <span class="inv-card-vin" onclick="event.stopPropagation();openDetalle(${m.id})" style="cursor:pointer;">VIN: <strong style="color:var(--vka-blue);text-decoration:underline;">${esc(m.vin)}</strong></span>
            <span class="badge ${tipoCls}">${tipoLabel}</span>
          </div>
          <div class="inv-card-row inv-card-bottom">
            <span class="inv-card-cliente">${esc(m.cliente_nombre || '—')}</span>
            <span style="${diasAlert?'color:var(--vka-orange);font-weight:700;':'color:var(--vka-grey);'}font-size:12px;">${m.dias_en_paso}d${diasAlert?' ⚠️':''}</span>
          </div>
          ${m.pedido_num ? `<div style="font-size:11px;color:var(--vka-grey);margin-top:3px;">Pedido: ${esc(m.pedido_num)} · <span style="${pagoColor}font-weight:600;">${m.pago_estado||'—'}</span></div>` : ''}
        </div>`;
    });
    html += '</div>';
    wrap.innerHTML = html;

  } else {
    // ── Desktop: table ─────────────────────────────────────────────────────────
    let html = `<table class="inv-table">
      <thead><tr>
        <th>VIN</th><th>Modelo / Color</th><th>Tipo</th><th>Estado</th>
        <th>Cliente</th><th>Pedido</th><th>Pago</th><th>Días</th><th>Punto</th>
      </tr></thead><tbody>`;

    motos.forEach(m => {
      const badgeCls  = ESTADOS_BADGE[m.estado] || '';
      const tipoCls   = m.tipo_asignacion === 'consignacion' ? 'badge-consignacion' : 'badge-voltika';
      const diasAlert = m.dias_en_paso > 1;
      html += `<tr onclick="openDetalle(${m.id})">
        <td><strong style="color:var(--vka-blue);text-decoration:underline;cursor:pointer;">${esc(m.vin)}</strong></td>
        <td>${esc(m.modelo)} <span style="color:var(--vka-grey)">${esc(m.color)}</span></td>
        <td><span class="badge ${tipoCls}">${m.tipo_asignacion === 'consignacion' ? 'Consig.' : 'Voltika'}</span></td>
        <td><span class="badge ${badgeCls}">${ESTADOS_LABEL[m.estado]||m.estado}</span></td>
        <td>${esc(m.cliente_nombre || '—')}</td>
        <td style="font-size:12px">${esc(m.pedido_num || '—')}</td>
        <td><span class="badge ${m.pago_estado==='pagada'?'badge-lista':'badge-por-llegar'}">${m.pago_estado||'—'}</span></td>
        <td style="${diasAlert?'color:var(--vka-orange);font-weight:700':''}">${m.dias_en_paso}d${diasAlert?' ⚠️':''}</td>
        <td style="font-size:11px">${esc(m.punto_nombre || '—')}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// DETALLE
// ═══════════════════════════════════════════════════════════════════════════════
function openDetalle(motoId) {
  currentDetalleId = motoId;
  const m = allMotos.find(m => m.id === motoId);
  if (!m) return;

  document.getElementById('modal-detalle-title').textContent = `${m.modelo} ${m.color} — ${m.vin}`;
  document.getElementById('modal-detalle-body').innerHTML = buildDetalleHtml(m);
  openModal('modal-detalle');
}

function buildDetalleHtml(m) {
  const log = m.log_estados || [];
  const logHtml = log.length
    ? log.slice().reverse().map(e =>
        `<div class="log-entry">
          <div class="log-dot"></div>
          <div>
            <div class="log-text"><strong>${esc(ESTADOS_LABEL[e.estado]||e.estado)}</strong> — ${esc(e.accion||'')}</div>
            <div class="log-time">${esc(e.timestamp||'')} · ${esc(e.dealer||'')}</div>
            ${e.notas ? `<div class="log-text" style="color:var(--vka-grey)">${esc(e.notas)}</div>` : ''}
          </div>
        </div>`).join('')
    : '<p style="color:var(--vka-grey);font-size:13px;">Sin historial registrado</p>';

  return `<div class="detail-row">
    <div class="detail-main">
      <div class="info-card">
        <div class="info-card-title">Información de la moto</div>
        ${infoRow('VIN', m.vin)}
        ${infoRow('Modelo', m.modelo)}
        ${infoRow('Color', m.color)}
        ${infoRow('Año modelo', m.anio_modelo || '—')}
        ${infoRow('Potencia', m.potencia || '—')}
        ${infoRow('Tipo', m.tipo_asignacion === 'consignacion' ? 'Consignación' : 'Voltika Entrega')}
        ${infoRow('Estado', ESTADOS_LABEL[m.estado] || m.estado)}
        ${infoRow('Días en paso', m.dias_en_paso + (m.dias_en_paso > 1 ? ' días ⚠️' : ' día'))}
        ${infoRow('Pago', m.pago_estado || '—')}
        ${m.precio_venta ? infoRow('Precio venta', '$' + Number(m.precio_venta).toLocaleString('es-MX') + ' MXN') : ''}
        ${m.fecha_llegada ? infoRow('Fecha llegada', m.fecha_llegada) : ''}
      </div>
      ${(m.descripcion || m.accesorios) ? `<div class="info-card">
        <div class="info-card-title">Descripción y Accesorios</div>
        ${m.descripcion ? infoRow('Descripción', m.descripcion) : ''}
        ${m.accesorios ? infoRow('Accesorios', m.accesorios) : ''}
      </div>` : ''}
      <div class="info-card">
        <div class="info-card-title">Información Aduanal</div>
        ${infoRow('No. Pedimento', m.num_pedimento || '—')}
        ${infoRow('Fecha ingreso al país', m.fecha_ingreso_pais || '—')}
        ${infoRow('Aduana', m.aduana || '—')}
        ${infoRow('Hecho en', m.hecho_en || '—')}
      </div>
      <div class="info-card">
        <div class="info-card-title">Información del cliente</div>
        ${infoRow('Nombre', m.cliente_nombre || '—')}
        ${infoRow('Email', m.cliente_email || '—')}
        ${infoRow('Teléfono', m.cliente_telefono || '—')}
        ${infoRow('Pedido', m.pedido_num || '—')}
        ${infoRow('Punto', m.punto_nombre || '—')}
      </div>
    </div>
    <div class="detail-side">
      <div class="info-card">
        <div class="info-card-title">Historial de estados</div>
        ${logHtml}
      </div>
      ${m.notas ? `<div class="info-card">
        <div class="info-card-title">Notas</div>
        <p style="font-size:13px;color:#555;">${esc(m.notas)}</p>
      </div>` : ''}
    </div>
  </div>`;
}

function infoRow(label, value) {
  return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${esc(value)}</span></div>`;
}

// AGREGAR / EDITAR MOTO
// ═══════════════════════════════════════════════════════════════════════════════
function openModalAdd() {
  document.getElementById('modal-add-title').textContent = 'Agregar motocicleta';
  document.getElementById('form-add').reset();
  document.getElementById('f-moto-id').value = '';
  document.getElementById('btn-save-moto').textContent = 'Guardar';
  document.getElementById('form-add-error').style.display = 'none';
  openModal('modal-add');
}

function editarMoto() {
  const m = allMotos.find(m => m.id === currentDetalleId);
  if (!m) return;
  closeModal('modal-detalle');
  document.getElementById('modal-add-title').textContent = 'Editar moto: ' + m.vin_display;
  document.getElementById('f-vin').value          = m.vin;
  document.getElementById('f-modelo').value       = m.modelo;
  document.getElementById('f-color').value        = m.color;
  document.getElementById('f-tipo').value         = m.tipo_asignacion;
  document.getElementById('f-estado').value       = m.estado;
  document.getElementById('f-cliente-nombre').value = m.cliente_nombre || '';
  document.getElementById('f-cliente-email').value  = m.cliente_email || '';
  document.getElementById('f-cliente-tel').value    = m.cliente_telefono || '';
  document.getElementById('f-pedido-num').value     = m.pedido_num || '';
  document.getElementById('f-pago-estado').value    = m.pago_estado || 'pagada';
  document.getElementById('f-precio').value         = m.precio_venta || '';
  document.getElementById('f-notas').value          = m.notas || '';
  document.getElementById('f-fecha-llegada').value  = m.fecha_llegada || '';
  document.getElementById('f-anio-modelo').value    = m.anio_modelo || '';
  document.getElementById('f-potencia').value       = m.potencia || '';
  document.getElementById('f-descripcion').value    = m.descripcion || '';
  document.getElementById('f-accesorios').value     = m.accesorios || '';
  document.getElementById('f-num-pedimento').value  = m.num_pedimento || '';
  document.getElementById('f-fecha-ingreso-pais').value = m.fecha_ingreso_pais || '';
  document.getElementById('f-aduana').value         = m.aduana || '';
  document.getElementById('f-hecho-en').value       = m.hecho_en || 'China';
  document.getElementById('f-moto-id').value        = m.id;
  document.getElementById('btn-save-moto').textContent = 'Guardar cambios';
  openModal('modal-add');
}

async function submitMoto(e) {
  if (e) e.preventDefault();
  const btn = document.getElementById('btn-save-moto');
  const errEl = document.getElementById('form-add-error');
  errEl.style.display = 'none';

  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> Guardando...';

  const motoId = document.getElementById('f-moto-id').value;
  const isEdit = !!motoId;

  const payload = {
    accion:           isEdit ? 'actualizar' : 'agregar',
    vin:              document.getElementById('f-vin').value.trim(),
    modelo:           document.getElementById('f-modelo').value,
    color:            document.getElementById('f-color').value.trim(),
    tipo_asignacion:  document.getElementById('f-tipo').value,
    estado:           document.getElementById('f-estado').value,
    cliente_nombre:   document.getElementById('f-cliente-nombre').value.trim(),
    cliente_email:    document.getElementById('f-cliente-email').value.trim(),
    cliente_telefono: document.getElementById('f-cliente-tel').value.trim(),
    pedido_num:       document.getElementById('f-pedido-num').value.trim(),
    pago_estado:      document.getElementById('f-pago-estado').value,
    precio_venta:     parseFloat(document.getElementById('f-precio').value) || 0,
    notas:            document.getElementById('f-notas').value.trim(),
    fecha_llegada:    document.getElementById('f-fecha-llegada').value || null,
    anio_modelo:      document.getElementById('f-anio-modelo').value.trim(),
    potencia:         document.getElementById('f-potencia').value.trim(),
    descripcion:      document.getElementById('f-descripcion').value.trim(),
    accesorios:       document.getElementById('f-accesorios').value.trim(),
    num_pedimento:    document.getElementById('f-num-pedimento').value.trim(),
    fecha_ingreso_pais: document.getElementById('f-fecha-ingreso-pais').value || null,
    aduana:           document.getElementById('f-aduana').value.trim(),
    hecho_en:         document.getElementById('f-hecho-en').value.trim(),
  };
  if (isEdit) payload.moto_id = parseInt(motoId);

  try {
    const r = await fetch('php/admin-inventario.php', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.ok) {
      closeModal('modal-add');
      showToast(isEdit ? '✅ Moto actualizada' : '✅ Moto agregada al inventario', 'success');
      await loadInventario();
    } else {
      errEl.textContent = d.error || 'Error al guardar';
      errEl.style.display = 'block';
    }
  } catch {
    errEl.textContent = 'Error de conexión';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = isEdit ? 'Guardar cambios' : 'Guardar';
  }
}

// VENTAS LOG
// ═══════════════════════════════════════════════════════════════════════════════
async function loadVentas() {
  const q    = document.getElementById('ventas-q').value;
  const tipo = document.getElementById('ventas-tipo').value;
  const url  = 'php/admin-ventas-log.php?' + new URLSearchParams({ q, tipo, limit:'100' });

  try {
    const r = await fetch(url);
    const d = await r.json();
    renderVentasSummary(d.summary || {});
    renderVentasTable(d.ventas || []);
  } catch {
    document.getElementById('ventas-table-wrap').innerHTML = '<div class="empty-inv" style="color:var(--vka-red)">Error al cargar ventas.</div>';
  }
}

function renderVentasSummary(s) {
  const el = document.getElementById('ventas-summary');
  if (!Object.keys(s).length) { el.innerHTML = ''; return; }
  el.innerHTML = Object.entries(s).map(([tipo, v]) =>
    `<div class="stat-card" style="padding:10px 14px;">
      <div class="stat-card-value" style="font-size:20px;">${v.count}</div>
      <div class="stat-card-label">${tipo.replace(/_/g,' ')}</div>
      ${v.total ? `<div style="font-size:11px;color:var(--vka-blue)">$${Number(v.total).toLocaleString('es-MX')}</div>` : ''}
    </div>`
  ).join('');
}

function renderVentasTable(ventas) {
  const el = document.getElementById('ventas-table-wrap');
  if (!ventas.length) {
    el.innerHTML = '<div class="empty-inv"><p>Sin registros de ventas</p></div>'; return;
  }

  const isMobile = window.innerWidth <= 680;

  if (isMobile) {
    let html = '<div class="inv-card-list">';
    ventas.forEach(v => {
      const monto = v.monto ? '$' + Number(v.monto).toLocaleString('es-MX') : '—';
      html += `
        <div class="inv-list-card" style="cursor:default;">
          <div class="inv-card-row inv-card-top">
            <span class="tipo-badge tipo-${v.tipo}">${v.tipo.replace(/_/g,' ')}</span>
            <span style="font-size:11px;color:var(--vka-grey);">${esc(v.freg||'')}</span>
          </div>
          <div class="inv-card-row" style="margin-top:6px;">
            <span style="font-size:14px;font-weight:700;color:var(--vka-blue-dark);">${esc(v.cliente_nombre||'—')}</span>
            <span style="font-size:14px;font-weight:800;color:var(--vka-green);">${monto}</span>
          </div>
          <div class="inv-card-row inv-card-bottom">
            <span style="font-size:12px;color:#555;">${esc(v.modelo||'—')} ${esc(v.color||'')}</span>
            <span style="font-size:11px;color:var(--vka-grey);">${esc(v.pedido_num||'—')}</span>
          </div>
          ${v.referido_nombre ? `<div style="font-size:11px;color:var(--vka-grey);margin-top:3px;">Ref: ${esc(v.referido_nombre)}</div>` : ''}
        </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
  } else {
    let html = `<table class="inv-table"><thead><tr>
      <th>Tipo</th><th>Cliente</th><th>Moto</th><th>Pedido</th>
      <th>Monto</th><th>Referido</th><th>Dealer</th><th>Fecha</th>
    </tr></thead><tbody>`;
    ventas.forEach(v => {
      html += `<tr>
        <td><span class="tipo-badge tipo-${v.tipo}">${v.tipo.replace(/_/g,' ')}</span></td>
        <td>${esc(v.cliente_nombre||'—')}</td>
        <td>${esc(v.modelo||'—')} ${esc(v.color||'')}</td>
        <td style="font-size:11px">${esc(v.pedido_num||'—')}</td>
        <td>${v.monto ? '$'+Number(v.monto).toLocaleString('es-MX') : '—'}</td>
        <td>${esc(v.referido_nombre||'—')}</td>
        <td style="font-size:11px">${esc(v.dealer_nombre||'—')}</td>
        <td style="font-size:11px">${esc(v.freg||'—')}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }
}

async function loadReferidos() {

  } catch {
    document.getElementById('referidos-wrap').innerHTML = '<div class="empty-inv" style="color:var(--vka-red)">Error al cargar referidos.</div>';

}

      html += `<tr>

        <td>${esc(r.telefono||'—')}</td>
        <td>${r.ventas_count || 0}</td>
        <td>${r.comision_total ? '$'+Number(r.comision_total).toLocaleString('es-MX') : '—'}</td>

    });

}

function openModalReferido() { openModal('modal-referido'); }
async function guardarReferido() {
  const nombre = document.getElementById('ref-nombre').value.trim();
  if (!nombre) { showToast('Nombre requerido', 'warning'); return; }
  try {
    const r = await fetch('php/admin-referidos.php', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ accion:'agregar', nombre, email: document.getElementById('ref-email').value.trim(), telefono: document.getElementById('ref-tel').value.trim() })
    });
    const d = await r.json();
    if (d.ok) {
      closeModal('modal-referido');
      showToast(`✅ Referido agregado. Código: ${d.codigo}`, 'success');
      loadReferidos();
    } else {
      showToast('❌ ' + (d.error || 'Error'), 'error');
    }
  } catch { showToast('Error de conexión', 'error'); }
}

// ═══════════════════════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════════════════════
function switchInvTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['lista','ventas','referidos'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('invtab-' + tab)?.classList.add('active');
  if (tab === 'ventas') loadVentas();
  if (tab === 'referidos') loadReferidos();
}

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }
function closeModalOnOverlay(e, id) { if (e.target.id === id) closeModal(id); }

function showToast(msg, type='') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
