<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Enganche Payment Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/configurador-variables.css">
    <link rel="stylesheet" href="css/configurador.css">
    <style>
        body {
            background: #F0F0F0;
            margin: 0;
            padding: 20px 0;
        }
        .vk-configurador {
            max-width: 500px;
            margin: 0 auto;
        }
        /* vk-card */
        .vk-card {
            background: var(--vk-bg-card);
            border-radius: var(--vk-radius-lg);
            box-shadow: var(--vk-shadow-card);
        }
        /* vk-back-btn */
        .vk-back-btn {
            background: none;
            border: none;
            color: var(--vk-text-secondary);
            font-size: 14px;
            cursor: pointer;
            padding: 8px 0;
            font-family: var(--vk-font-family);
        }
        /* vk-paso__titulo */
        .vk-paso__titulo {
            font-size: 22px;
            font-weight: 800;
            color: var(--vk-text-primary);
            margin-bottom: 12px;
        }
        /* vk-form-group */
        .vk-form-group {
            margin-bottom: 16px;
        }
        .vk-form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--vk-text-primary);
            margin-bottom: 6px;
        }
        /* vk-btn */
        .vk-btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--vk-radius-md);
            font-family: var(--vk-font-family);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }
        .vk-btn--primary {
            background: var(--vk-green-primary);
            color: #fff;
            box-shadow: var(--vk-shadow-button);
        }
        .vk-btn--primary:hover {
            background: var(--vk-green-dark);
        }
        /* vk-card-logos */
        .vk-card-logos img {
            height: 20px;
            vertical-align: middle;
            margin: 0 4px;
        }
        /* spinner */
        .vk-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: vk-spin 0.6s linear infinite;
            vertical-align: middle;
        }
        @keyframes vk-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="vk-configurador">
        <div id="vk-credito-enganche-container">
            <!-- Content will be rendered by JS -->
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Mock VkUI
        var VkUI = {
            renderBackButton: function(target) {
                return '<button class="vk-back-btn" data-go-to="' + target + '">&larr; Volver</button>';
            },
            formatPrecio: function(monto) {
                if (monto === null || monto === undefined) return '$--';
                return '$' + Math.round(monto).toLocaleString('es-MX');
            },
            renderCardLogos: function() {
                return '<span class="vk-card-logos">' +
                    '<img src="img/tarjetas/visa.svg" alt="Visa" style="height:20px;vertical-align:middle;">' +
                    '<img src="img/tarjetas/mastercard.svg" alt="Mastercard" style="height:20px;vertical-align:middle;margin-left:6px;">' +
                    '<img src="img/tarjetas/amex.svg" alt="Amex" style="height:20px;vertical-align:middle;margin-left:6px;">' +
                    '</span>';
            },
            renderSpinner: function() {
                return '<div class="vk-spinner"></div>';
            },
            getImagenMoto: function(modeloId, colorId) {
                var folders = { m05:'m05', m03:'m03', mc10:'mc10', mino:'mino', 'pesgo-plus':'pesgo', 'ukko-s':'ukko' };
                var colorFiles = { negro:'black_side', gris:'grey_side', plata:'silver_side', azul:'blue_side', verde:'green_side', naranja:'orange_side' };
                var folder = folders[modeloId] || modeloId;
                var file = colorFiles[colorId] || 'model';
                return 'img/' + folder + '/' + file + '.png';
            }
        };

        // Mock VkCalculadora
        var VkCalculadora = {
            calcular: function(precioContado, enganchePct, plazoMeses) {
                var enganche = Math.round(precioContado * enganchePct);
                var montoFinanciado = precioContado - enganche;
                var tasaMensual = 0.025;
                var pagoMensual = montoFinanciado * (tasaMensual * Math.pow(1 + tasaMensual, plazoMeses)) / (Math.pow(1 + tasaMensual, plazoMeses) - 1);
                var pagoSemanal = Math.round(pagoMensual / 4.33);
                return {
                    enganche: enganche,
                    montoFinanciado: montoFinanciado,
                    pagoMensual: Math.round(pagoMensual),
                    pagoSemanal: pagoSemanal,
                    totalAPagar: enganche + Math.round(pagoMensual * plazoMeses)
                };
            }
        };

        // Mock app + modelo data
        var mockApp = {
            state: {
                modeloSeleccionado: 'm05',
                enganchePorcentaje: 0.25,
                plazoMeses: 36,
                colorSeleccionado: 'gris',
                nombre: 'Juan Perez',
                email: 'juan@test.com',
                telefono: '5512345678',
                ciudad: 'CDMX',
                estado: 'Ciudad de Mexico',
                codigoPostal: '06600'
            },
            getModelo: function(id) {
                var modelos = {
                    m05: {
                        id: 'm05',
                        nombre: 'M05',
                        precioContado: 48260,
                        colorDefault: 'gris',
                        colores: [
                            { id: 'negro', nombre: 'Negro', hex: '#222' },
                            { id: 'gris', nombre: 'Gris', hex: '#888' },
                            { id: 'plata', nombre: 'Plata', hex: '#C0C0C0' }
                        ]
                    },
                    m03: {
                        id: 'm03',
                        nombre: 'M03',
                        precioContado: 38500,
                        colorDefault: 'negro',
                        colores: [
                            { id: 'negro', nombre: 'Negro', hex: '#222' },
                            { id: 'azul', nombre: 'Azul', hex: '#039fe1' }
                        ]
                    }
                };
                return modelos[id] || modelos['m05'];
            },
            irAPaso: function(paso) {
                alert('Navegar a: ' + paso);
            }
        };

        // Render the enganche screen
        jQuery(document).ready(function() {
            PasoCreditoEnganche.init(mockApp);
        });
    </script>
    <script src="js/modules/paso-credito-enganche.js"></script>

    <div style="text-align:center;margin-top:30px;padding:20px;">
        <h3 style="font-family:Inter,sans-serif;color:#333;">Test Controls</h3>
        <p style="font-family:Inter,sans-serif;color:#666;font-size:13px;">Change model/color to preview different configurations:</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:10px;">
            <button onclick="mockApp.state.modeloSeleccionado='m05';mockApp.state.colorSeleccionado='gris';PasoCreditoEnganche.render();"
                style="padding:8px 16px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-family:Inter;">M05 Gris</button>
            <button onclick="mockApp.state.modeloSeleccionado='m05';mockApp.state.colorSeleccionado='negro';PasoCreditoEnganche.render();"
                style="padding:8px 16px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-family:Inter;">M05 Negro</button>
            <button onclick="mockApp.state.modeloSeleccionado='m03';mockApp.state.colorSeleccionado='azul';PasoCreditoEnganche.render();"
                style="padding:8px 16px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-family:Inter;">M03 Azul</button>
        </div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:10px;">
            <button onclick="mockApp.state.enganchePorcentaje=0.25;PasoCreditoEnganche.render();"
                style="padding:8px 16px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-family:Inter;">25% Enganche</button>
            <button onclick="mockApp.state.enganchePorcentaje=0.30;PasoCreditoEnganche.render();"
                style="padding:8px 16px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-family:Inter;">30% Enganche</button>
            <button onclick="mockApp.state.enganchePorcentaje=0.50;PasoCreditoEnganche.render();"
                style="padding:8px 16px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-family:Inter;">50% Enganche</button>
        </div>
    </div>
</body>
</html>
