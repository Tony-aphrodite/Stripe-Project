<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test - Tu Voltika está lista</title>
<link rel="stylesheet" href="css/configurador.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; padding: 20px; font-family: 'Inter', -apple-system, sans-serif; }
.container { max-width: 420px; width: 100%; background: white; border-radius: 16px; padding: 24px 20px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
</style>
</head>
<body>
<div class="container">

<script>
(function() {
    var html = '';

    html += '<h2 class="vk-cpago-title">Tu Voltika est\u00e1 lista</h2>';

    html += '<p class="vk-cpago-subtitle">';
    html += 'Realiza el <strong>pago de tu enganche</strong> para preparar tu Voltika y programar la entrega.';
    html += '</p>';

    html += '<p style="text-align:center;font-size:13px;color:#999;margin-bottom:20px;">';
    html += 'Este pago se aplica directamente a tu financiamiento.';
    html += '</p>';

    html += '<div class="vk-cpago-checks">';

    html += '<label class="vk-cpago-check">';
    html += '<input type="checkbox" id="vk-cpago-check1" checked>';
    html += '<span class="vk-cpago-check__box"></span>';
    html += '<span class="vk-cpago-check__text">Confirmo que deseo <strong>continuar</strong> con mi cr\u00e9dito Voltika</span>';
    html += '</label>';

    html += '<label class="vk-cpago-check">';
    html += '<input type="checkbox" id="vk-cpago-check2" checked>';
    html += '<span class="vk-cpago-check__box"></span>';
    html += '<span class="vk-cpago-check__text">Acepto los t\u00e9rminos del <strong>cr\u00e9dito</strong> y registro de m\u00e9todo de pago</span>';
    html += '</label>';

    html += '</div>';

    html += '<button id="vk-cpago-continuar" onclick="alert(\'Continuando a Stripe...\')" style="display:block;width:100%;padding:16px;background:#1b5e3b;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;">';
    html += 'PAGAR ENGANCHE &rsaquo;';
    html += '</button>';

    html += '<div class="vk-cpago-footer" style="margin-top:14px;text-align:center;font-size:12px;color:#999;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;">';
    html += 'Pago cifrado SSL &middot;';
    html += '<span style="font-weight:700;color:#1a1f71;font-size:13px;">VISA</span>';
    html += '<span style="display:inline-block;width:28px;height:18px;background:linear-gradient(135deg,#eb001b 0%,#f79e1b 100%);border-radius:3px;"></span>';
    html += '<span style="font-weight:700;color:#016fd0;font-size:12px;">Amex</span>';
    html += '</div>';

    document.querySelector('.container').innerHTML = html;

    // Re-bind checkbox change
    document.addEventListener('change', function(e) {
        if (e.target.id === 'vk-cpago-check1' || e.target.id === 'vk-cpago-check2') {
            var both = document.getElementById('vk-cpago-check1').checked &&
                       document.getElementById('vk-cpago-check2').checked;
            var btn = document.getElementById('vk-cpago-continuar');
            btn.disabled = !both;
            btn.style.opacity = both ? '1' : '0.5';
        }
    });
})();
</script>
</div>
</body>
</html>
