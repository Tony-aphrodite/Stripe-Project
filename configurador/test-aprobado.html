<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test - Crédito Aprobado</title>
<link rel="stylesheet" href="css/configurador.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; padding: 20px; font-family: 'Inter', -apple-system, sans-serif; }
.container { max-width: 420px; width: 100%; }
</style>
</head>
<body>
<div class="container">
<div id="vk-credito-aprobado-container" class="vk-card" style="overflow:hidden;border-radius:16px;"></div>
</div>

<script>
// Minimal state mock
var state = { codigoPostal: '06600' };
var VOLTIKA_CP = {
    _buscar: function(cp) {
        return { ciudad: 'Ciudad de México', estado: 'CDMX' };
    }
};

// Render inline (copy of paso-credito-aprobado.js logic)
(function render() {
    var cpEntrega = state.codigoPostal || '';
    var cpInfo = cpEntrega && VOLTIKA_CP ? VOLTIKA_CP._buscar(cpEntrega) : null;
    var ciudadEntrega = cpInfo ? (cpInfo.ciudad + ', ' + cpInfo.estado) : '';

    var html = '';

    html += '<div class="vk-aprobado-header">';
    html += '<div class="vk-aprobado-header__check">';
    html += '<img src="img/aprobado.png" alt="" style="width:100px;height:100px;object-fit:contain;">';
    html += '</div>';
    html += '<h2 class="vk-aprobado-header__title" style="color:#ffffff;">\u00a1Felicidades!</h2>';
    html += '<p class="vk-aprobado-header__subtitle">Tu cr\u00e9dito Voltika ya est\u00e1 aprobado</p>';
    html += '<p style="color:rgba(255,255,255,0.85);font-size:13px;margin-top:8px;">Tu plan de pagos ya est\u00e1 listo y tu moto qued\u00f3 reservada para ti.</p>';
    html += '</div>';

    html += '<div class="vk-aprobado-body">';

    if (cpEntrega) {
        html += '<div class="vk-aprobado-info">';
        html += '<div class="vk-aprobado-info__row">';
        html += '<span style="font-size:18px;flex-shrink:0;">&#128205;</span>';
        html += '<div style="font-size:14px;line-height:1.5;">';
        html += 'Tu moto se entregar\u00e1 en un <strong>punto Voltika autorizado</strong> cerca de ti';
        html += '<div style="font-weight:700;margin-top:2px;">' + ciudadEntrega + ' (CP ' + cpEntrega + ')</div>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
    }

    html += '<div class="vk-aprobado-steps">';
    html += '<div class="vk-aprobado-steps__header">';
    html += '<span style="font-size:16px;">&#9201;</span>';
    html += '<strong>Solo faltan 30 segundos para terminar</strong>';
    html += '</div>';
    html += '<p style="font-size:13px;color:#666;margin-bottom:8px;">Para proteger tu cr\u00e9dito y evitar fraudes necesitamos confirmar tu identidad.</p>';
    var chk = '<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#039fe1;color:#fff;font-size:10px;flex-shrink:0;">&#10003;</span>';
    html += '<div class="vk-aprobado-steps__item">' + chk + ' Foto de tu INE</div>';
    html += '<div class="vk-aprobado-steps__item">' + chk + ' Selfie r\u00e1pida</div>';
    html += '<div class="vk-aprobado-steps__item">&#128274; Tu informaci\u00f3n est\u00e1 protegida y cifrada</div>';
    html += '</div>';

    html += '<button class="vk-btn vk-btn--primary" style="margin-top:16px;text-transform:uppercase;letter-spacing:0.5px;">CONTINUAR Y CONFIRMAR MI IDENTIDAD &rsaquo;</button>';
    html += '<p style="text-align:center;font-size:12px;color:#999;margin-top:6px;">Tu plan de pagos se mostrar\u00e1 en el siguiente paso.</p>';

    html += '<div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid #e5e7eb;">';
    var badges = ['Sin aval', 'Sin papeleo', 'Proceso 100% digital'];
    for (var i = 0; i < badges.length; i++) {
        html += '<span style="display:inline-flex;align-items:center;gap:4px;background:#e8f7ff;color:#0288cc;' +
            'border:1px solid #b3e0f7;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;">' +
            '<span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;' +
            'border-radius:50%;background:#039fe1;color:#fff;font-size:9px;flex-shrink:0;">&#10003;</span>' +
            badges[i] + '</span>';
    }
    html += '</div>';

    html += '<p style="text-align:center;font-size:12px;color:#999;margin-top:14px;line-height:1.5;">';
    html += 'Un asesor Voltika te contactar\u00e1 dentro de las pr\u00f3ximas <strong>48 horas</strong> para acompa\u00f1arte en la entrega de tu moto y resolver cualquier duda.';
    html += '</p>';

    html += '</div>';

    document.getElementById('vk-credito-aprobado-container').innerHTML = html;
})();
</script>
</body>
</html>
