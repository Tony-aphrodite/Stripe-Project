<style>
html,body { overflow-x: hidden; max-width: 100%; }

.cl-header {
  background: linear-gradient(135deg,#1a3a5c,#039fe1);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  color: #fff; position: sticky; top: 0; z-index: 100;
}
.cl-header img { height: 22px; }
.cl-header h1 { font-size: 14px; font-weight: 800; flex: 1; }
.cl-back { color: rgba(255,255,255,.8); text-decoration: none; font-size: 13px; }

/* Type selector */
.cl-type-bar {
  display: flex; background: #fff; border-bottom: 2px solid var(--vka-border);
  overflow-x: auto; scrollbar-width: none;
}
.cl-type-bar::-webkit-scrollbar { display: none; }
.cl-type-tab {
  flex: 1; text-align: center; padding: 12px 8px; font-size: 12px;
  font-weight: 700; color: var(--vka-grey); cursor: pointer;
  border-bottom: 3px solid transparent; white-space: nowrap;
  transition: color .2s, border-color .2s;
}
.cl-type-tab.active { color: var(--vka-blue); border-bottom-color: var(--vka-blue); }

/* Phase indicator */
.cl-phases {
  display: flex; align-items: center; padding: 12px 16px; background: #f8fafc;
  border-bottom: 1px solid var(--vka-border); gap: 4px; overflow-x: auto;
}
.cl-phase-dot {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; flex-shrink: 0;
  border: 2px solid var(--vka-border); background: #fff; color: var(--vka-grey);
}
.cl-phase-dot.done { background: var(--vka-blue); border-color: var(--vka-blue); color: #fff; }
.cl-phase-dot.active { background: var(--vka-blue-dark); border-color: var(--vka-blue-dark); color: #fff; box-shadow: 0 0 0 3px rgba(3,159,225,.25); }
.cl-phase-line { flex: 1; height: 2px; background: var(--vka-border); min-width: 12px; }
.cl-phase-line.done { background: var(--vka-blue); }
.cl-phase-label { font-size: 9px; color: var(--vka-grey); text-align: center; margin-top: 2px; }

/* Content */
.cl-content { padding: 12px; max-width: 600px; margin: 0 auto; }

/* Section */
.cl-section {
  background: #fff; border-radius: 10px; border: 1.5px solid var(--vka-border);
  margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.cl-section-head {
  padding: 10px 14px; background: var(--vka-blue-soft);
  font-size: 12px; font-weight: 800; color: var(--vka-blue-dark);
  text-transform: uppercase; letter-spacing: .5px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
}
.cl-section-head .cl-section-count {
  margin-left: auto; font-size: 11px; font-weight: 600;
  color: var(--vka-blue); background: var(--vka-blue-light);
  padding: 2px 8px; border-radius: 20px;
}
.cl-section-body { padding: 8px 14px 12px; }

/* Check item */
.cl-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid #f3f4f6;
}
.cl-item:last-child { border-bottom: none; }
.cl-item input[type="checkbox"] {
  width: 20px; height: 20px; margin-top: 1px;
  accent-color: var(--vka-blue); cursor: pointer; flex-shrink: 0;
}
.cl-item label { font-size: 13px; color: #333; cursor: pointer; flex: 1; line-height: 1.4; }
.cl-item.critical label { color: #C62828; font-weight: 600; }

/* Photo upload */
.cl-photo-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px; margin-top: 8px;
}
.cl-photo-slot {
  aspect-ratio: 1; border: 2px dashed var(--vka-border); border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px; color: var(--vka-grey); text-align: center;
  overflow: hidden; position: relative; background: #fafbfc;
}
.cl-photo-slot.has-photo { border-style: solid; border-color: var(--vka-green); }
.cl-photo-slot img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.cl-photo-slot input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

/* Declaration box */
.cl-declaration {
  background: #FFF8E1; border: 1.5px solid #FFD54F; border-radius: 10px;
  padding: 14px; margin: 12px 0; font-size: 12px; color: #5D4037; line-height: 1.7;
}

/* Torque badge */
.cl-torque {
  display: inline-block; background: #EDE9FE; color: #5B21B6;
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  margin-left: 6px;
}

/* Progress bar */
.cl-progress-wrap { padding: 0 16px 12px; }
.cl-progress-bar {
  height: 6px; background: #e5e7eb; border-radius: 20px; overflow: hidden;
}
.cl-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--vka-blue-dark), var(--vka-blue));
  border-radius: 20px; transition: width .4s;
}
.cl-progress-text {
  font-size: 11px; color: var(--vka-grey); text-align: right; margin-top: 4px;
}

/* Action buttons */
.cl-actions { padding: 12px 16px 24px; max-width: 600px; margin: 0 auto; }
.cl-btn-save {
  width: 100%; padding: 14px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 800; cursor: pointer; margin-bottom: 8px;
  letter-spacing: .5px;
}
.cl-btn-save.primary { background: var(--vka-blue); color: #fff; }
.cl-btn-save.success { background: var(--vka-green); color: #fff; }
.cl-btn-save.ghost { background: transparent; color: var(--vka-grey); border: 1.5px solid var(--vka-border); }
.cl-btn-save:disabled { opacity: .5; cursor: not-allowed; }

/* Locked overlay */
.cl-locked {
  background: #d1fae5; border: 2px solid #10b981; border-radius: 10px;
  padding: 20px; text-align: center; margin: 16px;
}
.cl-locked-icon { font-size: 40px; margin-bottom: 8px; }
.cl-locked-title { font-size: 18px; font-weight: 800; color: #065f46; }
.cl-locked-msg { font-size: 13px; color: #555; margin-top: 6px; }

/* Legal certificate */
.cl-legal {
  background: #fff; border: 1.5px solid var(--vka-border); border-radius: 10px;
  padding: 16px; margin-bottom: 12px; font-size: 12px; color: #333; line-height: 1.7;
}
.cl-legal h4 {
  font-size: 14px; font-weight: 800; color: var(--vka-blue-dark);
  margin-bottom: 8px; text-align: center;
}
.cl-legal-clause {
  background: #f8fafc; border-left: 3px solid var(--vka-blue);
  padding: 10px 12px; margin: 8px 0; border-radius: 0 6px 6px 0;
}

@media (max-width: 480px) {
  .cl-content { padding: 8px; }
  .cl-section-body { padding: 6px 10px 10px; }
  .cl-photo-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>

    title: 'Fase 5: Acta de Entrega (Legal)',
    icon: '📜',
    sections: [
      { id: 'acta', title: 'Acta de Entrega Voltika', items: [
        { key: 'acta_aceptada', label: 'Cliente acepta recibir motocicleta en condiciones óptimas', critical: true },
        { key: 'clausula_identidad', label: 'Cláusula de identidad aceptada', critical: true },
        { key: 'clausula_medios', label: 'Cláusula de medios electrónicos aceptada', critical: true },
        { key: 'clausula_uso_info', label: 'Cláusula de uso de información aceptada', critical: true },
        { key: 'firma_digital', label: 'Firma digital / aceptación', critical: true },
      ]},
    ],
    photos: [],
    legal: true,
  },
};

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Get moto_id from URL
  const params = new URLSearchParams(window.location.search);
  motoId = parseInt(params.get('moto_id')) || null;
  currentType = params.get('type') || 'origen';

  if (!motoId) {
    document.getElementById('cl-content').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--vka-red);">Error: moto_id no especificado.<br><a href="dealer-panel.html">Volver al panel</a></div>';
    return;
  }

  // Auth check
  fetch('php/admin-login.php', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ action: 'check' })
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) { dealer = d.dealer; switchType(currentType); }
    else { window.location.href = 'dealer-panel.html'; }
  })
  .catch(() => window.location.href = 'dealer-panel.html');
});

// ═══════════════════════════════════════════════════════════════════════════════
// TYPE SWITCH
// ═══════════════════════════════════════════════════════════════════════════════
function switchType(type) {
  currentType = type;
  document.querySelectorAll('.cl-type-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.cl-type-tab').forEach(t => {
    if (t.textContent.toLowerCase().includes(type)) t.classList.add('active');
  });

  if (type === 'origen') loadOrigen();
  else if (type === 'ensamble') loadEnsamble();
  else if (type === 'entrega') loadEntrega();
}

// ═══════════════════════════════════════════════════════════════════════════════
// ORIGEN
// ═══════════════════════════════════════════════════════════════════════════════
async function loadOrigen() {
  document.getElementById('cl-title').textContent = 'Checklist de Origen';
  document.getElementById('cl-phases').innerHTML = '';
  showLoading();

  try {
    const r = await fetch('php/admin-checklist-origen.php?moto_id=' + motoId);
    const d = await r.json();
    checklistData = d.checklist || {};
    renderOrigen();
  } catch(e) {
    showError('Error al cargar checklist de origen');
  }
}

function renderOrigen() {
  if (checklistData && checklistData.bloqueado) {
    showLocked('Checklist de Origen', checklistData.hash_registro);
    return;
  }

  let html = '';
  let totalItems = 0, checkedItems = 0;

  ORIGEN_SECTIONS.forEach(section => {
    const itemsHtml = section.items.map(item => {
      totalItems++;
      const checked = checklistData && checklistData[item.key];
      if (checked) checkedItems++;
      return renderItem(item, checked);
    }).join('');

    const count = section.items.filter(i => checklistData && checklistData[i.key]).length;
    html += `
      <div class="cl-section">
        <div class="cl-section-head" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          ${section.title}
          <span class="cl-section-count">${count}/${section.items.length}</span>
        </div>
        <div class="cl-section-body">${itemsHtml}</div>
      </div>`;
  });

  // Photos section
  html += `<div class="cl-section">
    <div class="cl-section-head">📸 13. Evidencia Fotográfica</div>
    <div class="cl-section-body">
      <div class="cl-photo-grid">${ORIGEN_PHOTOS.map((p,i) => renderPhotoSlot('origen_' + i, p)).join('')}</div>
    </div>
  </div>`;

  // Declaration
  html += `<div class="cl-declaration">
    <strong>REGLA DE ORO:</strong> Lo que no está validado en origen, no existe.
  </div>`;

  document.getElementById('cl-content').innerHTML = html;
  updateProgress(checkedItems, totalItems);
  renderOrigenActions(checkedItems === totalItems);
}

function renderOrigenActions(allDone) {
  document.getElementById('cl-actions').innerHTML = `
    <button class="cl-btn-save ghost" onclick="saveOrigen(false)">💾 Guardar progreso</button>
    <button class="cl-btn-save success" onclick="saveOrigen(true)" ${allDone ? '' : 'disabled'}>
      ⚡ GENERAR REGISTRO DE ORIGEN
    </button>
  `;
}

async function saveOrigen(completar) {
  const items = collectItems();
  try {
    const r = await fetch('php/admin-checklist-origen.php', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ moto_id: motoId, items, notas: '', completar })
    });
    const d = await r.json();
    showToast(d.message || (d.ok ? 'Guardado' : d.error), d.ok ? 'success' : 'error');
    if (d.completado) loadOrigen();
  } catch(e) {
    showToast('Error de conexión', 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ENSAMBLE
// ═══════════════════════════════════════════════════════════════════════════════
async function loadEnsamble() {
  document.getElementById('cl-title').textContent = 'Ensamble de Unidad';
  showLoading();

  try {
    const r = await fetch('php/admin-checklist-ensamble.php?moto_id=' + motoId);
    const d = await r.json();
    checklistData = d.checklist || {};
    currentPhase = checklistData.fase_actual || 'fase1';
    renderEnsamblePhases();
    renderEnsamble();
  } catch(e) {
    showError('Error al cargar checklist de ensamble');
  }
}

function renderEnsamblePhases() {
  const phases = ['fase1','fase2','fase3'];
  const labels = ['Inicio','Ensamble','Liberación'];
  let html = '';
  phases.forEach((p, i) => {
    const done = checklistData && checklistData[p + '_completada'];
    const active = currentPhase === p;
    html += `<div style="text-align:center;">
      <div class="cl-phase-dot ${done ? 'done' : active ? 'active' : ''}" onclick="setEnsamblePhase('${p}')">${done ? '✓' : i + 1}</div>
      <div class="cl-phase-label">${labels[i]}</div>
    </div>`;
    if (i < phases.length - 1) {
      html += `<div class="cl-phase-line ${done ? 'done' : ''}"></div>`;
    }
  });
  document.getElementById('cl-phases').innerHTML = html;
}

function setEnsamblePhase(phase) {
  currentPhase = phase;
  renderEnsamble();
  renderEnsamblePhases();
}

function renderEnsamble() {
  if (checklistData && checklistData.bloqueado) {
    showLocked('Ensamble de Unidad');
    return;
  }

  const phaseData = ENSAMBLE_PHASES[currentPhase];
  if (!phaseData) return;

  let html = '';
  if (phaseData.critical) {
    html += '<div style="text-align:center;padding:8px;background:#FEE2E2;border-radius:8px;margin-bottom:12px;font-size:12px;color:#991B1B;font-weight:700;">🔴 CRÍTICO — SI FALLA, NO SE LIBERA</div>';
  }

  let totalItems = 0, checkedItems = 0;

  phaseData.sections.forEach(section => {
    const itemsHtml = section.items.map(item => {
      totalItems++;
      const checked = checklistData && checklistData[item.key];
      if (checked) checkedItems++;
      return renderItem(item, checked);
    }).join('');

    const count = section.items.filter(i => checklistData && checklistData[i.key]).length;
    html += `
      <div class="cl-section">
        <div class="cl-section-head">${section.title}<span class="cl-section-count">${count}/${section.items.length}</span></div>
        <div class="cl-section-body">${itemsHtml}</div>
      </div>`;
  });

  if (phaseData.photos && phaseData.photos.length) {
    html += `<div class="cl-section">
      <div class="cl-section-head">📸 Evidencia Fotográfica</div>
      <div class="cl-section-body">
        <div class="cl-photo-grid">${phaseData.photos.map((p,i) => renderPhotoSlot(currentPhase + '_' + i, p)).join('')}</div>
      </div>
    </div>`;
  }

  const btnLabel = currentPhase === 'fase3' ? '⚡ LIBERAR UNIDAD A DISPONIBLE' : '⚡ Completar ' + phaseData.title;

  document.getElementById('cl-content').innerHTML = html;
  updateProgress(checkedItems, totalItems);
  document.getElementById('cl-actions').innerHTML = `
    <button class="cl-btn-save ghost" onclick="saveEnsamble(false)">💾 Guardar progreso</button>
    <button class="cl-btn-save success" onclick="saveEnsamble(true)" ${checkedItems === totalItems ? '' : 'disabled'}>${btnLabel}</button>
  `;
}

async function saveEnsamble(completar) {
  const items = collectItems();
  try {
    const r = await fetch('php/admin-checklist-ensamble.php', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ moto_id: motoId, fase: currentPhase, items, notas: '', completar_fase: completar })
    });
    const d = await r.json();
    showToast(d.message || (d.ok ? 'Guardado' : d.error), d.ok ? 'success' : 'error');
    if (d.fase_completada || d.completado) loadEnsamble();
  } catch(e) {
    showToast('Error de conexión', 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ENTREGA
// ═══════════════════════════════════════════════════════════════════════════════
async function loadEntrega() {
  document.getElementById('cl-title').textContent = 'Entrega de Unidad';
  showLoading();

  try {
    const r = await fetch('php/admin-checklist-entrega-v2.php?moto_id=' + motoId);
    const d = await r.json();
    checklistData = d.checklist || {};
    currentPhase = checklistData.fase_actual || 'fase1';
    renderEntregaPhases();
    renderEntrega();
  } catch(e) {
    showError('Error al cargar checklist de entrega');
  }
}

function renderEntregaPhases() {
  const phases = ['fase1','fase2','fase3','fase4','fase5'];
  const icons = ['🔐','💳','🏍️','🔐','📜'];
  let html = '';
  phases.forEach((p, i) => {
    const done = checklistData && checklistData[p + '_completada'];
    const active = currentPhase === p;
    html += `<div style="text-align:center;">
      <div class="cl-phase-dot ${done ? 'done' : active ? 'active' : ''}" onclick="setEntregaPhase('${p}')">${done ? '✓' : icons[i]}</div>
      <div class="cl-phase-label">F${i+1}</div>
    </div>`;
    if (i < phases.length - 1) html += `<div class="cl-phase-line ${done ? 'done' : ''}"></div>`;
  });
  document.getElementById('cl-phases').innerHTML = html;
}

function setEntregaPhase(phase) {
  currentPhase = phase;
  renderEntrega();
  renderEntregaPhases();
}

function renderEntrega() {
  if (checklistData && checklistData.bloqueado) {
    showLocked('Entrega de Unidad', null, 'Sin identidad + OTP + acta firmada = NO EXISTE ENTREGA');
    return;
  }

  const phaseData = ENTREGA_PHASES[currentPhase];

  let html = '';
  let totalItems = 0, checkedItems = 0;

  // Legal certificate special render for fase5
  if (phaseData.legal) {
    html += `<div class="cl-legal">
      <h4>ACTA DE ENTREGA VOLTIKA</h4>
      <p>Declaro que recibo la motocicleta en condiciones óptimas, completa y conforme a lo solicitado.</p>
      <div class="cl-legal-clause"><strong>Cláusula de Identidad:</strong> Declaro que soy la persona titular del contrato de compra o crédito.</div>
      <div class="cl-legal-clause"><strong>Cláusula de Medios Electrónicos:</strong> Acepto que esta entrega se valida mediante medios electrónicos, incluyendo OTP, registros digitales y evidencia fotográfica, con plena validez jurídica.</div>
      <div class="cl-legal-clause"><strong>Cláusula de Uso de Información:</strong> Autorizo el uso de la información, imágenes y validaciones para: validación de entrega, defensa legal, contracargos, cumplimiento ante autoridades (PROFECO, SAT, INAI).</div>
    </div>`;
  }

  phaseData.sections.forEach(section => {
    const itemsHtml = section.items.map(item => {
      totalItems++;
      const checked = checklistData && checklistData[item.key];
      if (checked) checkedItems++;
      return renderItem(item, checked);
    }).join('');

    const count = section.items.filter(i => checklistData && checklistData[i.key]).length;
    html += `<div class="cl-section">
      <div class="cl-section-head">${section.title}<span class="cl-section-count">${count}/${section.items.length}</span></div>
      <div class="cl-section-body">${itemsHtml}</div>
    </div>`;
  });

  if (phaseData.photos && phaseData.photos.length) {
    html += `<div class="cl-section">
      <div class="cl-section-head">📸 Evidencia</div>
      <div class="cl-section-body">
        <div class="cl-photo-grid">${phaseData.photos.map((p,i) => renderPhotoSlot(currentPhase + '_' + i, p)).join('')}</div>
      </div>
    </div>`;
  }

  if (phaseData.rule) {
    html += `<div style="text-align:center;padding:10px;background:#FEE2E2;border-radius:8px;margin-top:8px;font-size:12px;color:#991B1B;font-weight:700;">⚠️ ${phaseData.rule}</div>`;
  }

  const btnLabel = currentPhase === 'fase5' ? '⚡ FINALIZAR ENTREGA' : '⚡ Completar ' + phaseData.title;

  document.getElementById('cl-content').innerHTML = html;
  updateProgress(checkedItems, totalItems);
  document.getElementById('cl-actions').innerHTML = `
    <button class="cl-btn-save ghost" onclick="saveEntrega(false)">💾 Guardar progreso</button>
    <button class="cl-btn-save success" onclick="saveEntrega(true)" ${checkedItems === totalItems ? '' : 'disabled'}>${btnLabel}</button>
  `;
}

async function saveEntrega(completar) {
  const items = collectItems();
  try {
    const r = await fetch('php/admin-checklist-entrega-v2.php', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ moto_id: motoId, fase: currentPhase, items, notas: '', completar_fase: completar })
    });
    const d = await r.json();
    showToast(d.message || (d.ok ? 'Guardado' : d.error), d.ok ? 'success' : 'error');
    if (d.fase_completada || d.completado) loadEntrega();
  } catch(e) {
    showToast('Error de conexión', 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// SHARED RENDERERS
// ═══════════════════════════════════════════════════════════════════════════════
function renderItem(item, checked) {
  const cls = item.critical ? ' critical' : '';
  const torque = item.torque ? `<span class="cl-torque">${item.torque}</span>` : '';
  return `<div class="cl-item${cls}">
    <input type="checkbox" id="ck-${item.key}" data-key="${item.key}" ${checked ? 'checked' : ''} onchange="onItemChange()">
    <label for="ck-${item.key}">${item.label}${torque}</label>
  </div>`;
}

function renderPhotoSlot(id, label) {
  return `<div class="cl-photo-slot" id="photo-${id}">
    <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(this,'${id}')">
    <span>📷</span>
    <span>${label}</span>
  </div>`;
}

function handlePhoto(input, id) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const slot = document.getElementById('photo-' + id);
    slot.classList.add('has-photo');
    slot.innerHTML = `<img src="${e.target.result}">
      <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(this,'${id}')">`;
    uploadedPhotos[id] = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function collectItems() {
  const items = {};
  document.querySelectorAll('[data-key]').forEach(cb => {
    items[cb.dataset.key] = cb.checked;
  });
  return items;
}

function onItemChange() {
  // Re-count and update progress + button state
  let total = 0, checked = 0;
  document.querySelectorAll('[data-key]').forEach(cb => {
    total++;
    if (cb.checked) checked++;
  });
  updateProgress(checked, total);

  // Enable/disable complete button
  const successBtn = document.querySelector('.cl-btn-save.success');
  if (successBtn) successBtn.disabled = (checked < total);

  // Update section counts
  document.querySelectorAll('.cl-section').forEach(sec => {
    const items = sec.querySelectorAll('[data-key]');
    const done = [...items].filter(i => i.checked).length;
    const countEl = sec.querySelector('.cl-section-count');
    if (countEl) countEl.textContent = `${done}/${items.length}`;
  });
}

function updateProgress(checked, total) {
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById('cl-progress-fill').style.width = pct + '%';
  document.getElementById('cl-progress-text').textContent = `${checked} / ${total} (${pct}%)`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════
function showLoading() {
  document.getElementById('cl-content').innerHTML =
    '<div style="text-align:center;padding:40px;"><div class="loader dark" style="width:28px;height:28px;border-width:3px;"></div></div>';
  document.getElementById('cl-actions').innerHTML = '';
}

function showError(msg) {
  document.getElementById('cl-content').innerHTML =
    `<div style="text-align:center;padding:40px;color:var(--vka-red);">${msg}</div>`;
}

function showLocked(title, hash, extra) {
  document.getElementById('cl-content').innerHTML = `
    <div class="cl-locked">
      <div class="cl-locked-icon">🔒</div>
      <div class="cl-locked-title">${title} — Completado</div>
      <div class="cl-locked-msg">Este registro está bloqueado y no puede modificarse.</div>
      ${hash ? `<div style="font-size:10px;color:var(--vka-grey);margin-top:8px;word-break:break-all;">Hash: ${hash}</div>` : ''}
      ${extra ? `<div style="font-size:12px;color:#065f46;font-weight:700;margin-top:8px;">${extra}</div>` : ''}
    </div>`;
  document.getElementById('cl-actions').innerHTML = '';
}

function showToast(msg, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || '');
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
